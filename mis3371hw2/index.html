<html lang="en">
    <head>
    <link rel="stylesheet" href="hw2.css"> 
		
    <title>New Patient Registration | Luna Family Clinic</title>
</head>
<body>
    <header>
    <table width="100%">
        <tr>
            <td valign="top" align="left" width="25%">
                <div class="image">
                    <img align="center" src="caduceus.png" alt="caduceus" width="80px" id="logo"/>
                </div>
            </td>
			
            <td align="center">
                <h2>Luna Family Clinic</h2>
            </td>
			
            <td valign="bottom" align="right" width="25%">
                Today's Date: <span id="today"></span></p>
            </td>
        </tr>
    </table>
</header>
<hr>
	<!--form starts-->

    <form name="signup" id="signup" action="thankyou.html">
    <center>
        <div class="format">
            <table>
                <tr>
    <th colspan="4"> Create New Patient Account</th>
</tr>
				
<tr>
    <td class="td1"><label for="firstname">First Name:</label></td>
    <td>
        <input type="text" 
        name="firstname" 
        id="firstname"
		minlength="1"
        maxlength="30" 
        title="Letter, apostrophes, and dashes only"
    	pattern="[a-zA-Z']{1,30}"
        required 
        placeholder="John"
		/>
    </td>
</tr>

<tr>
    <td class="td1"><label for="midinitial"> Middle Initial:</label></td>
    <td>
        <input type="text" 
        name="midinitial" 
        id="midinitial" 
        maxlength="1"
		size="1"
		title="Letters only"
        pattern="[a-zA-Z']{0,1}"	
        placeholder="M"
		/>
    </td>
</tr>
<tr>
	    <td class="td1"><label for="lastname">Last Name:</label></td>
    <td>
        <input type="text" 
        name="lastname" 
        id="lastname"
		minlength="1"
        maxlength="30" 
        title="Letter, apostrophes, and dashes only"
		pattern="[a-zA-Z']{1,30}
        required 
        placeholder="Ortiz"
		/>
    </td>
</tr>

<!--dob-->
<tr>
    <td class="td1"><label for="dob">Date of Birth:</label></td>
    <td>
        <input type="date" 
        id="dob" 
        name="dob"
		onblur="validateDob()"
    	required
		/>
<span class="error" id="dobcheck"></span>	
    </td>
</tr>	

<!--ssn-->
<tr>
	    <td class="td1"><label for="ssn">SSN:</label></td>
    <td>
        <input type="password" 
        name="ssn" 
        id="ssn" 
        maxlength="11"
		minlength="11"
        title="Numbers only" 
        required 
        placeholder="123-12-5678"
		onblur="validateSsn()"
			/>
<span class="error" id="ssncheck"></span>
	
    </td>
</tr>

<!--gender-->
<tr>
	<td class="td1"><label for="gender">Patient Gender</label></td>
	<td>
		<input 
			type="radio"
			id="gender1"
			name="gender"
			value="Male"
			/> Male

		<input 
			type="radio"
			id="gender2"
			name="gender"
			value="Female"
			/> Female

		<input 
			type="radio"
			id="gender3"
			name="gender"
			value="Other"
			/> Other
	</td>
</tr>

<tr>
	<th colspan="4"><hr></th>
</tr>

<tr>
	<th colspan="4"> Contact Information</th>
</tr>

<!--address1-->
<tr>
    <td class="td1"><label for="addressl1">Address 1:</label></td>
    <td>
        <input type="text" 
        name="addressl1" 
        id="addressl1"
		minlength="2"
        maxlength="30" 
		title="Enter your address"
        required 
        placeholder="125683 Avenue"
			/>
    </td>
</tr>

<!--address2-->
<tr>
    <td class="td1"><label for="addressl2">Address 2:</label></td>
    <td>
        <input type="text" 
        name="addressl2" 
        id="addressl2"
		minlength="2"
        maxlength="30" 
		title="Enter your address"
        placeholder="Apt123"	
			/>
    </td>
</tr>

<!--city-->
<tr>
	<td class="td1"><label for="city">City:</label></td>
	<td>
		<input type="text"
			name="city"
			id="city"
			minlength="2"
			maxlength="30"
			title="Enter your city"
			required
			placeholder="Houston"
			/>
	</td>
</tr>

<!--state-->
<tr>
     <td class="td1"><label for="state">State:<label></td>
     <td>
	     <select name="state" id="state">
           <option selected disabled>Please Select One</option>
           <option value="AL">Alabama</option>
           <option value="AK">Alaska</option>
           <option value="AZ">Arizona</option>
           <option value="AR">Arkansas</option>
           <option value="CA">California</option>
           <option value="CO">Colorado</option>
           <option value="CT">Connecticut</option>
           <option value="DE">Delaware</option>
           <option value="DC">District of Columbia</option>
           <option value="FL">Florida</option>
           <option value="GA">Georgia</option>
           <option value="GU">Guam</option>	
           <option value="HI">Hawaii</option>	
           <option value="ID">Idaho</option>	
           <option value="IL">Illinois</option>	
           <option value="IN">Indiana</option>	
           <option value="IA">Iowa</option>	
           <option value="KS">Kansas</option>	
           <option value="KY">Kentucky</option>	
           <option value="LA">Louisiana</option>	
           <option value="ME">Maine</option>	
           <option value="MD">Maryland</option>	
           <option value="MA">Massachusetts</option>	
           <option value="MI">Michigan</option>	
           <option value="MN">Minnesota</option>	
           <option value="MS">Mississippi</option>	
           <option value="MO">Missouri</option>
           <option value="MT">Montana</option>
           <option value="NE">Nebraska</option>
           <option value="NV">Nevada</option>	
           <option value="NH">New Hampshire</option>	
           <option value="NJ">New Jersey</option>	
           <option value="NM">New Mexico</option>	
           <option value="NY">New York</option>	
           <option value="NC">North Carolina</option>	
           <option value="ND">North Dakota</option>	
           <option value="OH">Ohio</option>	
           <option value="OK">Oklahoma</option>	
           <option value="OR">Oregon</option>	
           <option value="PA">Pennsylvania</option>	
           <option value="PR">Puerto Rico</option>	
           <option value="RI">Rhode Island</option>	
           <option value="SC">South Carolina</option>	
           <option value="SD">South Dakota</option>	
           <option value="TN">Tennessee</option>	
           <option value="TX">Texas</option>	
           <option value="UT">Utah</option>	
           <option value="VT">Vermont</option>	
           <option value="VA">Virginia</option>	
           <option value="WA">Washington</option>	
           <option value="WV">West Virginia</option>	
           <option value="WI">Wisconsin</option>	
           <option value="WY">Wyoming</option>	
        </select>
       </td>
 </tr>

				
<!--zipcode-->
<tr>
	<td class="td1"><label for="zipcode">Zip Code:</label></td>
	<td>
		<input type="text"
		name="zipcode"
		id="zipcode"
		minlength="5"
		maxlength="10"
		pattern="^\d{5}(-\d{4})?$"
		title="Enter your zipcode"
		required
		placeholder="77890"
		onblur="validateZipcode()"
		/>
<span class="error" id="zipcodecheck"></span>
	</td>
</tr>

<!--emailaddress-->

<tr>
	<td class="td1"><label for="emailaddress">Email Address:</label></td>
	<td>
		<input type="email"
			name="emailaddress"
			id="emailaddress"
			maxlength="30"
			title="Enter your email address"
			required
			placeholder="abcdeg@gmail.com"
			pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,20}$"
			onblur="validateEmailaddress()"
			/>
		<span class="error" id="emailaddresscheck"></span>
	</td>
	
</tr>

<!--phonenumber-->
<tr>
	<td class="td1"><label for="phonenumber">Phone Number:</label></td>
    <td>
        <input type="text" 
        name="phonenumber" 
        id="phonenumber" 
        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" 
        title="Enter your phone number" 
		required
		maxlength="30"
        placeholder="123-456-8654"
		onblur="validatePhonenumber()"
			/>
		<span class="error" id="Phonenumbercheck"></span>
    </td>
</tr>		 

<tr>
	<th colspan="4"><hr></th>
</tr>

<tr>
	<th colspan="4"> Patient's Medical History</th>
</tr>		

		 
<!--symptomps-->
<tr>
    <td class="td1" align="right">
		<label for="description">Any Current symptoms? <br> if so please explain:</label>
	</td>
    <td>
        <textarea 
			id="description" 
			name="description" 
			rows="3" 
			cols="50" 
			maxlength="150"
			title="Explain your symptoms"
			placeholder="Explain your symptoms"
			></textarea>
		<span id="descriptionsym"></span>
    </td>
</tr>



<!--alcohol-->
<tr>
	<td class="td1"><label for="alcohol">Have you consumed alcohol?</label></td>
	<td>
		<input 
			type="radio"
			id="alcohol1"
			name="alcohol"
			value="Yes"
			/> Yes
		<input 
			type="radio"
			id="alcohol2"
			name="alcohol"
			value="No"
			/> No
	</td>
</tr>
<!--allergies--> 
		 
	<tr>
	<td class="td1"><label for="allergies">Any allergies?</label></td>
	<td>
		<input 
			type="radio"
			id="allergies1"
			name="allergies"
			value="Yes"
			/> Yes
		<input 
			type="radio"
			id="allergies2"
			name="allergies"
			value="No"
			/> No
	</td>
</tr>
		 
<!--pasthistory-->
<tr>
    <td class="td1"><label for="pasthistory">Have you ever had:</label></td>
    <td>
        <input type="checkbox" id="choice1" name="pasthistory" value="Asthma"/>
		<label for="choice1">Asthma</label>

		<input type="checkbox" id="choice2" name="pasthistory"  value="Diabetes"/>
		<label for="choice2">Diabetes</label>

		<input type="checkbox" id="choice3" name="pasthistory" value="Anemia"/>
		<label for="choice3">Anemia</label>

		<input type="checkbox" id="choice4" name="pasthistory"  value="HIV/AIDS"/>
		<label for="choice4">HIV/AIDS</label>

		<input type="checkbox" id="choice5" name="pasthistory"  value="Arthritis"/>
		<label for="choice5">Arthritis</label>
	</td>
</tr>
<!--range-->
<tr>
    <td class="td1"><label for="painrange">Rate your pain level<br/>Rate from 0-10, 10 being the highest pain level</label></td>
    <td>
	    <input
	    type="range"
	    name="range"
	    id="range"
      	min="0"
       	max="10"
       	value="0"
      	 />
       <span id="rangepain"></span>
     </td>
 </tr>
<tr>
	<th colspan="4"><hr></th>
</tr>
<tr>
	<th colspan="4"> Create a Patient Account:</th>
</tr>

<!--userid-->
<tr>
    <td class="td1"><label for="userid">User ID:</label></td>
        <td>
            <input
                type="text"
                name="userid"
                id="userid"
				minlength="5"
                maxlength="30"
                required
                title="Enter a username ID, at least 5 characters, cannot begin with a number"
                placeholder="asdf123"
				onblur="validateUserid()"
                />
			<span class="error" id="useridcheck"></span>
            </td>
        </tr>

<!--password-->		 
<tr>
    <td class="td1"><label for="password">Password:</label></td>
    <td>
        <input 
			type="password" 
        	name="password" 
       		id="password" 
        	minlength="8"
			maxlength="30"
			required
			title= "Passwords must contain at least 1 uppercase, 1 lowercase letter, 1 digit and 1 special character"
			placeholder="asdf123l"
			onblur="validatePassword()"
			oninput="validatePassword()"
			onfocus="validatePassword()"
			/>
	 </br>
		 <span class="error" id="passwordcheck"></span>
    </td>
</tr>

<!--reenterpassword-->
<tr>
    <td class="td1"><label for="repassword"> Re-enter password:</label></td>
    <td>
        <input 
			type="password" 
        	name="repassword" 
       		id="repassword" 
        	minlength="8"
			maxlength="30"
			required
			title="Re-enter your password"
			placeholder="asdf123l"
			onblur="rePassword()"
			oninput="rePassword()"
			onfocus="rePassword()"
			/>
	 	</br>
		 <span class="error" id="repasswordcheck"></span>
    </td>
</tr>
	
       <tr>
    <td class="td1" colspan="4">
        <center>
            <input type="submit" name="submit" id="submit">
            <input type="reset" name="reset" id="reset">
			<input type="button" name="Review" id="review" value="Review" onclick="reviewInput()">
        </center>
    </td>
</tr>
</table>
</div>

<div class="passwordmessage">
    <span id="msg1"></span> <br/>
    <span id="msg2"></span> <br/>
    <span id="msg3"></span> <br/>
    <span id="msg4"></span> <br/>
	<span id="msg5"></span> <br/>
	<span id="msg6"></span> <br/>
	<span id="msg7"></span> <br/>
	<span id="repasswordcheck"></span> <br/>
</div>		 

<center>
	<p id="showInput"></p>
</center>
	 </center>

	 </form>
		 
<footer>
    <p id="footer"> &#169 Luna Family Clinic |<a href="https://nafcclinics.org/" target="_blank" rel="noopener noreferrer"> Contact Us!</a></p>
</footer>
         
<script src="hw2.js"></script>
	 </body>
</html>
